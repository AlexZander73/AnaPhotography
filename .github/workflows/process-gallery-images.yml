name: Process Gallery Images

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - assets/images/originals/**
      - scripts/process_images.py
      - process-images.command

permissions:
  contents: write

jobs:
  process:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pillow

      - name: Process originals into web images and gallery data
        run: python scripts/process_images.py

      - name: Commit generated files (if changed)
        run: |
          if git diff --quiet; then
            echo "No generated changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/images/web assets/images/thumbnails assets/images/originals/inbox gallery-data.js assets/images/gallery-index.csv
          git commit -m "Auto-process gallery images from originals"
          git push
